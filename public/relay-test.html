<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VisGraph Relay Test — Mock Chat</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0d1117;
      color: #c9d1d9;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      font-size: 14px;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    header {
      padding: 12px 20px;
      background: #161b22;
      border-bottom: 1px solid #30363d;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    header h1 { font-size: 15px; color: #e6edf3; }
    header small { color: #8b949e; font-size: 12px; }
    .badge {
      margin-left: auto;
      background: #21262d;
      border: 1px solid #30363d;
      border-radius: 4px;
      padding: 3px 8px;
      font-size: 11px;
      color: #8b949e;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .msg {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .msg .role {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .5px;
      text-transform: uppercase;
      color: #8b949e;
    }
    .msg.user .role { color: #58a6ff; }
    .msg.assistant .role { color: #3fb950; }
    .msg .body {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 10px 14px;
      white-space: pre-wrap;
      font-family: monospace;
      font-size: 13px;
      line-height: 1.6;
    }

    #input-area {
      border-top: 1px solid #30363d;
      padding: 12px 20px;
      background: #0d1117;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    #input-area label { font-size: 11px; color: #8b949e; }
    #chat-input {
      width: 100%;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #c9d1d9;
      font-family: monospace;
      font-size: 13px;
      padding: 8px 10px;
      resize: vertical;
      min-height: 60px;
    }
    #chat-input:focus { outline: none; border-color: #58a6ff; }
    .btn-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    button {
      padding: 5px 12px;
      border: 1px solid #30363d;
      border-radius: 6px;
      background: #21262d;
      color: #c9d1d9;
      cursor: pointer;
      font-size: 12px;
    }
    button:hover { background: #30363d; border-color: #58a6ff; color: #58a6ff; }
    button.primary {
      background: #1f6feb;
      border-color: #1f6feb;
      color: #fff;
    }
    button.primary:hover { background: #388bfd; }

    #log {
      font-size: 11px;
      color: #8b949e;
      font-family: monospace;
      min-height: 18px;
    }
  </style>
</head>
<body>

<header>
  <h1>VisGraph Relay Test</h1>
  <small>Mock chat — drag the VisGraph bookmarklet here to test</small>
  <span class="badge" id="status">No relay</span>
</header>

<div id="messages">
  <div class="msg user">
    <div class="role">User</div>
    <div class="body">Model me a small FOAF social network with Alice, Bob, Carol.</div>
  </div>
</div>

<div id="input-area">
  <label>Simulated assistant message (TOOL blocks injected here by buttons below, or type manually):</label>
  <textarea id="chat-input" placeholder="Paste TOOL blocks here or click a preset…"></textarea>
  <div class="btn-row">
    <button onclick="sendPreset('multiline')">Multiline TOOL block</button>
    <button onclick="sendPreset('inline')">Inline params (GPT style)</button>
    <button onclick="sendPreset('fenced')">Fenced (```text…```)</button>
    <button onclick="sendPreset('batch')">Batch (add + layout + export)</button>
    <button onclick="sendPreset('loadRdf')">loadRdf</button>
    <button onclick="sendPreset('reasoning')">runReasoning</button>
    <button onclick="sendPreset('export')">exportGraph turtle</button>
    <button class="primary" id="send-btn" onclick="sendMsg()">▶ Add as assistant message</button>
  </div>
  <div id="log"></div>
</div>

<script>
/* ── Preset TOOL blocks ─────────────────────────────────────────────────── */
var PRESETS = {
  multiline: [
    'Loading FOAF vocabulary then checking the graph state:\n\n',
    'TOOL: loadRdf\n',
    'url: http://xmlns.com/foaf/0.1/\n\n',
    'TOOL: getGraphState\n',
  ].join(''),

  inline: [
    'Adding three researchers:\n\n',
    'TOOL: addNode iri: http://example.org/alice typeIri: foaf:Person label: Alice\n',
    'TOOL: addNode iri: http://example.org/bob typeIri: foaf:Person label: Bob\n',
    'TOOL: addNode iri: http://example.org/carol typeIri: foaf:Person label: Carol\n',
  ].join(''),

  fenced: [
    'Here are the tool calls:\n\n',
    '```text\n',
    'TOOL: addNode\n',
    'iri: http://example.org/dave\n',
    'label: Dave\n',
    'typeIri: http://xmlns.com/foaf/0.1/Person\n',
    '\n',
    'TOOL: runLayout\n',
    'algorithm: dagre-lr\n',
    '```\n',
  ].join(''),

  batch: [
    'Adding links and running layout:\n\n',
    'TOOL: addLink\n',
    'subjectIri: http://example.org/alice\n',
    'predicateIri: foaf:knows\n',
    'objectIri: http://example.org/bob\n\n',
    'TOOL: addLink\n',
    'subjectIri: http://example.org/bob\n',
    'predicateIri: foaf:knows\n',
    'objectIri: http://example.org/carol\n\n',
    'TOOL: runLayout\n',
    'algorithm: dagre-lr\n\n',
    'TOOL: fitCanvas\n\n',
    'TOOL: exportImage\n',
    'format: svg\n',
    'noCss: true\n',
  ].join(''),

  loadRdf: 'TOOL: loadRdf\nurl: http://xmlns.com/foaf/0.1/\n',

  reasoning: [
    'Running OWL-RL reasoner:\n\n',
    'TOOL: runReasoning\n\n',
    'TOOL: getGraphState\n',
  ].join(''),

  export: 'TOOL: exportGraph\nformat: turtle\n',
};

/* ── DOM helpers ────────────────────────────────────────────────────────── */
var messages = document.getElementById('messages');
var chatInput = document.getElementById('chat-input');
var log = document.getElementById('log');

function setLog(msg) { log.textContent = msg; }

function sendPreset(key) {
  chatInput.value = PRESETS[key] || '';
}

function addMessage(role, text) {
  var msg = document.createElement('div');
  msg.className = 'msg ' + role;
  msg.innerHTML = '<div class="role">' + role + '</div><div class="body"></div>';
  msg.querySelector('.body').textContent = text;
  messages.appendChild(msg);
  messages.scrollTop = messages.scrollHeight;
  return msg;
}

/* ── "Send" — adds text as assistant message ──────────────────────────────
 * The bookmarklet's MutationObserver watches document.body for new nodes.
 * Adding a new div triggers it just like a real chat app would.
 * ───────────────────────────────────────────────────────────────────────── */
function sendMsg() {
  var text = chatInput.value.trim();
  if (!text) return;
  addMessage('assistant', text);
  chatInput.value = '';
  setLog('Assistant message added — relay should detect TOOL blocks in ~400 ms.');
}

/* ── Allow Enter in textarea to send (Shift+Enter = newline) ─────────────── */
chatInput.addEventListener('keydown', function (e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMsg();
  }
});

/* ── Monitor for result injections from the relay ───────────────────────── */
// The relay bookmarklet calls injectResult() which writes to this textarea.
// We watch its value via an 'input' event to show it as a user message and
// surface it in the log.
chatInput.addEventListener('input', function () {
  var v = chatInput.value;
  if (v.includes('[VisGraph')) {
    setLog('✓ Result injected by relay — will auto-submit in ~300 ms.');
  }
});

// Intercept the submit (Enter dispatch from relay) to show as user message
chatInput.addEventListener('keydown', function (e) {
  if (e.key === 'Enter' && !e.shiftKey && chatInput.value.includes('[VisGraph')) {
    // relay is auto-submitting — capture and display
    setTimeout(function () {
      var val = chatInput.value;
      if (val.trim()) {
        addMessage('user', val);
        chatInput.value = '';
        setLog('✓ Auto-submitted by relay.');
      }
    }, 0);
  }
}, true);

/* ── Status badge: show whether relay badge is present ─────────────────── */
var statusEl = document.getElementById('status');
setInterval(function () {
  var badge = document.getElementById('vg-relay-badge');
  statusEl.textContent = badge ? '🟢 Relay active' : 'No relay';
  statusEl.style.color = badge ? '#3fb950' : '#8b949e';
}, 1000);
</script>
</body>
</html>
