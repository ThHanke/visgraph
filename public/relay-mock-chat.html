<!DOCTYPE html>
<html lang="en" style="--background: #1f2023; --text-color: #FFFFFF; color-scheme: dark;">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VisGraph Relay — Mock Chat Page</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #1f2023;
      color: #fff;
      font-family: system-ui, sans-serif;
      font-size: 14px;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }
    header {
      background: #161b22;
      border-bottom: 1px solid #30363d;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    header h1 { font-size: 15px; color: #58a6ff; }
    header .badge {
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 4px;
      padding: 3px 8px;
      font-size: 11px;
      color: #8b949e;
    }
    #scenario-bar {
      background: #161b22;
      border-bottom: 1px solid #21262d;
      padding: 8px 12px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }
    #scenario-bar span { color: #8b949e; font-size: 12px; margin-right: 4px; }
    button.scenario {
      background: #21262d;
      border: 1px solid #30363d;
      border-radius: 4px;
      color: #c9d1d9;
      cursor: pointer;
      font-size: 12px;
      padding: 4px 10px;
    }
    button.scenario:hover { background: #30363d; }
    #chat-stream {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .msg {
      max-width: 720px;
      width: 100%;
      margin: 0 auto;
    }
    .msg-user {
      background: #2d333b;
      border-radius: 8px;
      padding: 10px 14px;
      align-self: flex-end;
    }
    .msg-ai {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 10px 14px;
      white-space: pre-wrap;
      font-family: monospace;
      font-size: 13px;
      line-height: 1.6;
    }
    .msg-label {
      font-size: 11px;
      color: #8b949e;
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .msg-label .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #58a6ff;
    }
    .msg-label.user-label .dot { background: #3fb950; }
    #input-row {
      border-top: 1px solid #30363d;
      background: #161b22;
      padding: 10px 12px;
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }
    #user-input {
      flex: 1;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #c9d1d9;
      font-size: 13px;
      padding: 8px 10px;
      resize: none;
      min-height: 40px;
      max-height: 140px;
    }
    #user-input:focus { outline: none; border-color: #58a6ff; }
    button#send-btn {
      background: #238636;
      border: none;
      border-radius: 6px;
      color: #fff;
      cursor: pointer;
      font-size: 13px;
      padding: 8px 14px;
    }
    button#send-btn:hover { background: #2ea043; }
    #status-bar {
      font-size: 11px;
      color: #8b949e;
      background: #0d1117;
      padding: 4px 12px;
      border-top: 1px solid #21262d;
    }
  </style>
</head>
<body>

<header>
  <h1>⬡ VisGraph Relay — Mock Chat</h1>
  <span class="badge">Bookmarklet test page</span>
</header>

<div id="scenario-bar">
  <span>UI mode:</span>
  <button class="scenario" id="mode-fhgenie" style="border-color:#58a6ff;color:#58a6ff;">FhGenie (textarea)</button>
  <button class="scenario" id="mode-openwebui">Open WebUI (contenteditable)</button>
  <button class="scenario" id="mode-chatgpt">ChatGPT (ProseMirror)</button>
  <span style="margin-left:8px;">Inject scenario:</span>
  <button class="scenario" data-scenario="single">Single addNode</button>
  <button class="scenario" data-scenario="batch">Batch (3 nodes)</button>
  <button class="scenario" data-scenario="full">Full: nodes + links + layout</button>
  <button class="scenario" data-scenario="prefixed">Prefixed IRIs</button>
  <button class="scenario" data-scenario="unknown-tool">Unknown tool</button>
  <button class="scenario" data-scenario="clear" style="border-color:#f85149;color:#f85149;">Clear chat</button>
</div>

<div id="chat-stream">
  <div class="msg">
    <div class="msg-label user-label"><span class="dot"></span> You</div>
    <div class="msg-user">Use the VisGraph relay to add some nodes. (Load the bookmarklet first.)</div>
  </div>
</div>

<div id="input-row">
  <!-- FhGenie-style: plain textarea -->
  <textarea id="user-input" rows="1" placeholder="Result will be injected here by the relay… (FhGenie mode)"></textarea>
  <!-- Open WebUI-style: contenteditable div (hidden by default) -->
  <div id="owui-input" contenteditable="true" role="textbox"
       style="display:none;flex:1;background:#0d1117;border:1px solid #30363d;border-radius:6px;color:#c9d1d9;font-size:13px;padding:8px 10px;min-height:40px;max-height:140px;overflow:auto;"
       aria-label="Chat-Eingabe" data-placeholder="Result will be injected here by the relay… (Open WebUI mode)"></div>
  <!-- ChatGPT ProseMirror-style: contenteditable div with inner p (hidden by default) -->
  <div id="gpt-input-wrap" style="display:none;flex:1;position:relative;">
    <div id="gpt-input" contenteditable="true" role="textbox" aria-multiline="true"
         class="ProseMirror"
         style="background:#212121;border:1px solid #424242;border-radius:12px;color:#ececec;font-size:14px;padding:10px 14px;min-height:44px;max-height:200px;overflow:auto;">
      <p><br></p>
    </div>
  </div>
  <button id="send-btn" type="submit" aria-label="send">Send</button>
</div>

<div id="status-bar">Ready. Load the bookmarklet, then click a scenario above.</div>

<script>
// ── Scenarios ──────────────────────────────────────────────────────────────
var SCENARIOS = {
  single: [
    'AI',
    '`{"jsonrpc":"2.0","id":1,"method":"tools/call","params":{"name":"addNode","arguments":{"iri":"http://example.org/Alice","label":"Alice","typeIri":"http://example.org/Person"}}}`'
  ],
  batch: [
    'AI',
    '`{"jsonrpc":"2.0","id":1,"method":"tools/call","params":{"name":"addNode","arguments":{"iri":"http://example.org/Alice","label":"Alice","typeIri":"http://example.org/Person"}}}`\n`{"jsonrpc":"2.0","id":2,"method":"tools/call","params":{"name":"addNode","arguments":{"iri":"http://example.org/Bob","label":"Bob","typeIri":"http://example.org/Person"}}}`\n`{"jsonrpc":"2.0","id":3,"method":"tools/call","params":{"name":"addNode","arguments":{"iri":"http://example.org/Carol","label":"Carol","typeIri":"http://example.org/Person"}}}`'
  ],
  full: [
    'AI',
    'First, add the nodes:\n\n`{"jsonrpc":"2.0","id":1,"method":"tools/call","params":{"name":"addNode","arguments":{"iri":"http://example.org/Alice","label":"Alice","typeIri":"http://example.org/Person"}}}`\n`{"jsonrpc":"2.0","id":2,"method":"tools/call","params":{"name":"addNode","arguments":{"iri":"http://example.org/Bob","label":"Bob","typeIri":"http://example.org/Person"}}}`\n`{"jsonrpc":"2.0","id":3,"method":"tools/call","params":{"name":"runLayout","arguments":{"algorithm":"dagre-lr"}}}`\n`{"jsonrpc":"2.0","id":4,"method":"tools/call","params":{"name":"fitCanvas","arguments":{}}}`\n`{"jsonrpc":"2.0","id":5,"method":"tools/call","params":{"name":"exportImage","arguments":{"format":"svg","noCss":true}}}`'
  ],
  prefixed: [
    'AI',
    '`{"jsonrpc":"2.0","id":1,"method":"tools/call","params":{"name":"addNode","arguments":{"iri":"ex:PrefixedNode","label":"PrefixedNode","typeIri":"owl:Class"}}}`'
  ],
  'unknown-tool': [
    'AI',
    '`{"jsonrpc":"2.0","id":1,"method":"tools/call","params":{"name":"nonExistentTool","arguments":{"param1":"value1"}}}`'
  ],
};

var stream = document.getElementById('chat-stream');
var statusBar = document.getElementById('status-bar');

// ── Chat flow simulation ───────────────────────────────────────────────────
// Disable the active input + send button so isAiStreaming() returns true.
function lockInput() {
  document.getElementById('send-btn').disabled = true;
  var ta = document.getElementById('user-input');
  if (ta.style.display !== 'none') ta.disabled = true;
  var ce = document.getElementById('owui-input');
  if (ce.style.display !== 'none') ce.setAttribute('aria-disabled', 'true');
  var gpt = document.getElementById('gpt-input');
  if (gpt.closest('#gpt-input-wrap').style.display !== 'none') gpt.setAttribute('aria-disabled', 'true');
}
function unlockInput() {
  document.getElementById('send-btn').disabled = false;
  var ta = document.getElementById('user-input');
  ta.disabled = false;
  document.getElementById('owui-input').removeAttribute('aria-disabled');
  document.getElementById('gpt-input').removeAttribute('aria-disabled');
}

// Stream text word-by-word into a pre-existing DOM element.
// Calls onDone() when finished and re-enables the input.
var STREAM_DELAY_MS = 18; // ms between words — fast enough for tests, visible enough to see
function streamTextInto(el, text, onDone) {
  var words = text.split(' ');
  var i = 0;
  function next() {
    if (i >= words.length) {
      unlockInput();
      if (onDone) onDone();
      return;
    }
    el.textContent += (i === 0 ? '' : ' ') + words[i];
    i++;
    setTimeout(next, STREAM_DELAY_MS);
  }
  next();
}

function addMessage(role, text, onDone) {
  var wrapper = document.createElement('div');
  wrapper.className = 'msg';

  var label = document.createElement('div');
  label.className = 'msg-label' + (role === 'user' ? ' user-label' : '');
  var dot = document.createElement('span');
  dot.className = 'dot';
  label.appendChild(dot);
  label.appendChild(document.createTextNode(' ' + (role === 'user' ? 'You' : 'AI')));
  wrapper.appendChild(label);

  var body = document.createElement('div');
  body.className = role === 'user' ? 'msg-user' : 'msg-ai';
  wrapper.appendChild(body);

  stream.appendChild(wrapper);
  stream.scrollTop = stream.scrollHeight;

  if (role === 'ai') {
    lockInput();
    statusBar.textContent = 'AI generating…';
    streamTextInto(body, text, function() {
      statusBar.textContent = 'AI done — bookmarklet should detect TOOL blocks now.';
      if (onDone) onDone();
    });
  } else {
    body.textContent = text;
    statusBar.textContent = 'Message added.';
    if (onDone) onDone();
  }
}

// ── UI mode switching ───────────────────────────────────────────────────────
var currentMode = 'fhgenie';
function setMode(mode) {
  currentMode = mode;
  document.getElementById('user-input').style.display = mode === 'fhgenie' ? '' : 'none';
  document.getElementById('owui-input').style.display = mode === 'openwebui' ? '' : 'none';
  document.getElementById('gpt-input-wrap').style.display = mode === 'chatgpt' ? '' : 'none';
  ['mode-fhgenie','mode-openwebui','mode-chatgpt'].forEach(function(id) {
    var el = document.getElementById(id);
    el.style.borderColor = '';
    el.style.color = '';
  });
  var activeId = 'mode-' + mode;
  document.getElementById(activeId).style.borderColor = '#58a6ff';
  document.getElementById(activeId).style.color = '#58a6ff';
  statusBar.textContent = 'Mode: ' + mode + '. Load the bookmarklet, then click a scenario.';
  document.getElementById('send-btn').disabled = (mode === 'openwebui');
}
document.getElementById('mode-fhgenie').addEventListener('click', function() { setMode('fhgenie'); });
document.getElementById('mode-openwebui').addEventListener('click', function() { setMode('openwebui'); });
document.getElementById('mode-chatgpt').addEventListener('click', function() { setMode('chatgpt'); });

document.querySelectorAll('button.scenario').forEach(function(btn) {
  btn.addEventListener('click', function() {
    var s = btn.dataset.scenario;
    if (s === 'clear') {
      while (stream.children.length > 1) stream.removeChild(stream.lastChild);
      statusBar.textContent = 'Chat cleared.';
      return;
    }
    var data = SCENARIOS[s];
    if (!data) return;
    addMessage(data[0].toLowerCase(), data[1]);
  });
});

// Allow manual send
document.getElementById('send-btn').addEventListener('click', function() {
  var v = '';
  if (currentMode === 'fhgenie') {
    var ta = document.getElementById('user-input');
    v = ta.value.trim();
    if (!v) return;
    addMessage('user', v);
    ta.value = '';
  } else if (currentMode === 'openwebui') {
    var ce = document.getElementById('owui-input');
    v = (ce.innerText || '').trim();
    if (!v) return;
    addMessage('user', v);
    ce.innerText = '';
  } else {
    var gpt = document.getElementById('gpt-input');
    v = (gpt.innerText || '').trim();
    if (!v) return;
    addMessage('user', v);
    gpt.innerHTML = '<p><br></p>';
  }
});
document.getElementById('user-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); document.getElementById('send-btn').click(); }
});
document.getElementById('owui-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); document.getElementById('send-btn').click(); }
});
document.getElementById('gpt-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); document.getElementById('send-btn').click(); }
});

// ── ChatGPT ProseMirror paste (Chrome path: clipboardData accessible) ────────
function handleSyntheticPaste(e) {
  if (e.isTrusted) return;
  var cd = e.clipboardData;
  if (cd) {
    var text = cd.getData('text/plain');
    if (text) {
      e.preventDefault();
      document.execCommand('insertText', false, text);
    }
  }
}
document.getElementById('gpt-input').addEventListener('paste', handleSyntheticPaste);

// ── OpenWebUI TipTap paste — simulates real TipTap + Svelte reactive binding ──
// Send button starts disabled; enabled only when editor has content (like OpenWebUI).
// Paste path mirrors real TipTap in Firefox:
//   1. Try e.clipboardData.getData() — Chrome allows this; Firefox blocks non-trusted
//   2. If empty, fall back to navigator.clipboard.readText() (async) — in Firefox this
//      reads the OS clipboard, which may have stale content → UUID bug
// This lets us reproduce and test the real injection failure.
(function () {
  var owuiEl = document.getElementById('owui-input');
  var sendBtn = document.getElementById('send-btn');

  function updateSendBtn() {
    if (currentMode !== 'openwebui') return;
    sendBtn.disabled = !(owuiEl.innerText || '').trim();
  }

  owuiEl.addEventListener('input', updateSendBtn);

  // Also disable send when switching to OpenWebUI mode
  var origSetMode = window.setMode || null;
  document.getElementById('mode-openwebui').addEventListener('click', function () {
    setTimeout(updateSendBtn, 0);
  });
  document.getElementById('mode-fhgenie').addEventListener('click', function () {
    setTimeout(function () { sendBtn.disabled = false; }, 0);
  });
  document.getElementById('mode-chatgpt').addEventListener('click', function () {
    setTimeout(function () { sendBtn.disabled = false; }, 0);
  });

  // Simulate TipTap's beforeinput handler: execCommand('insertText') fires
  // beforeinput(inputType='insertText') which TipTap handles by inserting text
  // and updating its document state, enabling the send button.
  // The bookmarklet now uses this path (no synthetic paste events).
  owuiEl.addEventListener('beforeinput', function (e) {
    if (e.inputType === 'insertText' && e.data) {
      // TipTap would handle this; our mock just lets the browser default handle it
      // (browser inserts text into contenteditable, then 'input' event fires → button updates)
    }
  });

  // Keep paste handler for real user pastes (trusted events).
  owuiEl.addEventListener('paste', function (e) {
    if (!e.isTrusted) return; // non-trusted synthetic paste — ignore (bookmarklet uses insertText now)
    // Real paste: browser handles clipboardData, input event fires → button updates
  });
})();
</script>
</body>
</html>
